<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  overflow: hidden;
  transition: background 1.5s;
}

.section {
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 20px;
  white-space: pre-line;
}

.active {
  display: flex;
  animation: fade 0.8s ease;
}

button {
  padding: 12px 28px;
  border-radius: 30px;
  border: none;
  margin: 10px;
  cursor: pointer;
  font-size: 15px;
  background: white;
  color: black;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.glow {
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from {text-shadow: 0 0 10px #fff;}
  to {text-shadow: 0 0 25px #ff4da6;}
}

.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  animation: fall 2s linear forwards;
}

@keyframes fall {
  to {transform: translateY(100vh) rotate(360deg); opacity: 0;}
}
</style>
</head>

<body>

<audio id="bgmusic" loop>
  <source src="music.mp3">
</audio>

<audio id="clicksound">
  <source src="click.mp3">
</audio>

<!-- PARTS -->
<div class="section active" id="s0">
  <h2 id="t0"></h2>
  <button onclick="clickSound();startMusic();next(1)">Okay fine</button>
</div>

<div class="section" id="s1">
  <h2 id="t1"></h2>
  <button onclick="clickSound();choose(0)">Just a random thing</button>
  <button onclick="clickSound();choose(1)">Something important</button>
</div>

<div class="section" id="s2">
  <h2 id="t2"></h2>
  <button onclick="clickSound();next(3)">Excuse me??</button>
</div>

<div class="section" id="s3">
  <h2 id="t3"></h2>
  <button onclick="clickSound();next(4)">hihi</button>
</div>

<div class="section" id="s4">
  <h2 id="t4"></h2>
  <button onclick="clickSound();next(5)">Go on</button>
</div>

<div class="section" id="s5">
  <h2 id="t5"></h2>
  <button onclick="clickSound();next(6)">yayyy</button>
</div>

<div class="section" id="s6">
  <h2 id="t6"></h2>
  <button onclick="clickSound();next(7)">...</button>
</div>

<div class="section" id="s7">
  <h3>When did we become friends?</h3>
  <input id="answer">
  <br>
  <button onclick="clickSound();check()">Submit</button>
  <button onclick="clickSound();hint()">Hint</button>
  <p id="hintText"></p>
</div>

<div class="section" id="s8">
  <h2 id="tFinal" class="glow"></h2>
  <button onclick="clickSound();next(9)">one last thing?</button>
</div>

<div class="section" id="s9">
  <h2 id="tExtra"></h2>
  <button onclick="clickSound();tooLate()">go back</button>
</div>

<div class="section" id="s10">
  <h2>Too late now :)<br>You’re stuck forever.</h2>
</div>

<script>

let started=false;

function clickSound(){
  let s=document.getElementById("clicksound");
  s.currentTime=0;
  s.play();
}

function startMusic(){
 if(!started){
  let m=document.getElementById("bgmusic");
  m.volume=0.3;
  m.play();
  started=true;
 }
}

const texts=[
"Hey Avni :) \n\nBefore you go ahead…\npromise you won’t rush this.",
"So tell me… \nwhat do you think this is going to be?",
"",
"Scientists should study this…\n\nhow one person managed\nto turn “hihi” into a full personality trait.",
"Case study confirmed.\n\nAnd my dreams…\n\nI’m literally in life-or-death situations\nrunning, fighting, surviving like a movie scene\n\nand then I wake up\nand casually tell you like\n“yeah so I almost died yesterday”",
"Also…\n\nyou just survived your exams.\n\nI know you won’t admit it,\nbut that took effort.\n\nso yeah… good job.",
"We didn’t really plan this, did we?\n\nno big start, no dramatic moment…\n\njust random letters\nthat somehow… stayed.",
"",
"Happy Friendship Anniversary ❤️\n\nnot bad for something that started\nwith random letters…\nand somehow turned into this.\n\nyou’re still annoying btw 😝\n\nbut I guess…\nyou became important without me realizing it.\n\nso yeah… you matter."
];

function typeText(id,text,i=0){
 document.getElementById(id).innerHTML="";
 function t(){
  if(i<text.length){
    document.getElementById(id).innerHTML+=text.charAt(i++);
    setTimeout(t,18);
  }
 }
 t();
}

typeText("t0",texts[0]);
typeText("t1",texts[1]);

function next(n){
 document.querySelector(".active").classList.remove("active");
 document.getElementById("s"+n).classList.add("active");

 if(n!==2 && n!==7 && n!==8 && n!==9 && n!==10){
  typeText("t"+n,texts[n]);
 }

 if(n===8){
  document.body.style.background="linear-gradient(135deg,#141e30,#243b55)";
  typeText("tFinal",texts[8]);
 }

 if(n===9){
  typeText("tExtra","One last thing…\n\nI don’t say this often,\nbut I’m really glad it’s you.");
 }
}

function choose(opt){
 document.querySelector(".active").classList.remove("active");
 document.getElementById("s2").classList.add("active");

 let intro = opt===0 ? "Yeah… that’s what you think.\n\n" : "Hmm… interesting choice.\n\n";
 let main = "You’ve always been like this…\nclicking things without thinking.\n\nmysterious… unpredictable…\nand disappearing randomly like you never existed.";
 typeText("t2",intro+main);
}

function check(){
 let ans=document.getElementById("answer").value.trim().toLowerCase();

 if(ans==="8 may"){
  confetti();
  setTimeout(()=>{
    document.querySelector(".active").classList.remove("active");
    document.getElementById("s8").classList.add("active");
    typeText("tFinal",texts[8]);
  },800);
 } else {
  alert("Close… but not quite.");
 }
}

function hint(){
 document.getElementById("hintText").innerText="Today :)";
}

function tooLate(){
 document.querySelector(".active").classList.remove("active");
 document.getElementById("s10").classList.add("active");
}

function confetti(){
 for(let i=0;i<80;i++){
  let c=document.createElement("div");
  c.className="confetti";
  c.style.left=Math.random()*100+"vw";
  c.style.background=["#ff4d4d","#ffd700","#4dff88","#4dd2ff"][Math.floor(Math.random()*4)];
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),2000);
 }
}

</script>

</body>
</html>
